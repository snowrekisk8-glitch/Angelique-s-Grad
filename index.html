<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Ate Marcia</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Lora:wght@400;500&display=swap" rel="stylesheet">

<style>

body{
margin:0;
height:100vh;
overflow:hidden;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(135deg,#ff9ecf,#ff6fae,#ffb6d9);
font-family:'Lora',serif;
}

/* Flying paper plane */

.plane{
position:absolute;
font-size:60px;
cursor:pointer;
animation:fly 12s linear infinite;
}

@keyframes fly{
0%{
transform:translateX(-120px) translateY(60px) rotate(-15deg);
}
50%{
transform:translateX(50vw) translateY(-80px) rotate(10deg);
}
100%{
transform:translateX(110vw) translateY(80px) rotate(15deg);
}
}

/* Card */

.card{
position:absolute;
background:white;
padding:40px;
width:90%;
max-width:720px;
border-radius:16px;
box-shadow:0 20px 50px rgba(0,0,0,0.15);
opacity:0;
transform:scale(.8);
transition:.6s;
}

.card.show{
opacity:1;
transform:scale(1);
}

/* Typography */

h1{
font-family:'Montserrat',sans-serif;
font-size:36px;
color:#ff4f9a;
margin-bottom:20px;
}

#message{
font-size:18px;
line-height:1.7;
white-space:pre-line;
color:#333;
}

.quote{
margin-top:28px;
font-style:italic;
font-size:19px;
text-align:center;
color:#555;
}

/* Cursor */

.cursor{
display:inline-block;
width:2px;
background:#ff4f9a;
margin-left:4px;
animation:blink 1s infinite;
}

@keyframes blink{
0%{opacity:1}
50%{opacity:0}
100%{opacity:1}
}

</style>
</head>

<body>

<div class="plane" id="plane">✈️</div>

<div class="card" id="card">
<h1>Hello ate!</h1>
<div id="message"></div>
<div id="quote"></div>
<span class="cursor"></span>
</div>

<script>

const messageText = `Char, hiak ngayan it ate haat HAHAHAHAHA. First, I want to congratulate you on bagging the valedictatorian title HAHAHA. Then, good luck hit imo college endeavors, always remember nga aadi la kami para haiyo.

I want to thank you for being one of the pillars kun hin-o maak yana, naging usa ka han mga nagshape haak nga maging better version hitak sarili.

Tim college life is magiging usa nga rollercoaster ride, danay aadi ha igbaw danay aat ha ilarom. But, never lose yourself in the process. Enjoy your college life, kasi after that, sasampalon ka na hit katotohanan. Mas damo na nga responsibilities tim sasaluhon.

Always remember nga we are rooting for your success!
`;

const quoteText = `"ENJOY ENJOY LEARN LEARN LEARN!"`;

let i = 0;

function typeMessage(){
if(i < messageText.length){
document.getElementById("message").innerHTML += messageText.charAt(i);
i++;
setTimeout(typeMessage,25);
}else{
typeQuote();
}
}

let q = 0;

function typeQuote(){
if(q < quoteText.length){
document.getElementById("quote").innerHTML =
'<div class="quote">' + quoteText.substring(0,q+1) + '</div>';
q++;
setTimeout(typeQuote,35);
}
}

/* Click plane */

document.getElementById("plane").onclick = function(){

this.style.display="none";

document.getElementById("card").classList.add("show");

typeMessage();

}

</script>

</body>
</html>
